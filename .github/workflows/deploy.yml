# Convention Deploy — reusable workflow for push=preview deployment.
#
# Replaces the composite action (action.yml) with a single reusable workflow
# that absorbs all deployment boilerplate: routing, validation, SSH transport,
# git auth via GitHub App token, and deploy-linker issue comments.
#
# Design: CCI #646 (deployment-runtime-state-design), Parts 4 + 6 + 7.
# Decision: Reusable workflow chosen over composite action because project
# workflows were duplicating identical job structures, deploy-linker logic,
# and issue extraction. This absorbs all of it — projects provide only
# domain-suffix and ssh-host.
#
# Token flow: Org secrets (APP_ID, APP_PRIVATE_KEY) → actions/create-github-app-token
# → ephemeral 1hr token → injected as env var into SSH commands → deploy scripts
# use HTTPS + token for git pull. No permanent git credentials on any server.
# Falls back to existing SSH git if APP_ID not set (incremental rollout).
#
# Back-pressure levels (all fatal):
#   L0 (convention) — validator job, exit 10 — compose convention checks
#   L1 (preflight)  — preflight.sh,  exit 11 — server readiness checks
#   L2 (config)     — deploy script,  exit 12 — compose config validation
#   L3 (health)     — deploy script,  exit 13 — service health checks
#   L4 (access)     — deploy script,  exit 14 — external access verification
#
# Error transport: scripts echo DEPLOY_ERROR:LEVEL=N:DETAIL=... before exit.
# Deploy-linker parses this from /tmp/deploy.log for level-specific comments.
#
# Per-project workflow (~12 lines):
#   name: Deploy
#   on:
#     push:
#       branches: ['issue-*', 'staging']
#     pull_request:
#       types: [closed]
#       branches: [staging]
#   jobs:
#     deploy:
#       uses: WILSCH-AI-SERVICES/deploy-action/.github/workflows/deploy.yml@2026-03-30-09-31
#       with:
#         domain-suffix: wilsch-deployment.com
#         ssh-host: 91.99.74.207
#       secrets: inherit

name: Convention Deploy

on:
  workflow_call:
    inputs:
      domain-suffix:
        description: 'Domain suffix for preview URLs (e.g., wilsch-deployment.com)'
        required: true
        type: string
      ssh-host:
        description: 'SSH host IP for deployment server'
        required: true
        type: string

# Secrets inherited from caller via `secrets: inherit`.
# Org-level: DEPLOY_SSH_KEY, APP_ID, APP_PRIVATE_KEY
# Deploy-linker uses App token (owner: DaveX2001) — no separate ISSUE_LINKER_TOKEN needed

jobs:
  # ─── Route: detect action from caller's trigger context ───
  route:
    name: Route
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.detect.outputs.action }}
      branch: ${{ steps.detect.outputs.branch }}
      issue-number: ${{ steps.detect.outputs.issue-number }}
    steps:
      - name: Detect action from trigger
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            ACTION="cleanup-preview"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            BRANCH="staging"
            ACTION="deploy-staging"
          else
            BRANCH="${{ github.ref_name }}"
            ACTION="deploy-preview"
          fi

          ISSUE_NUM=$(echo "$BRANCH" | grep -oP '(?<=issue-)\d+' || true)

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue-number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "Action: $ACTION | Branch: $BRANCH | Issue: ${ISSUE_NUM:-none}"

  # ─── Validate: Level 0 convention checks (skip for cleanup) ───
  validate:
    name: Level 0 — Convention Validator
    needs: route
    if: needs.route.outputs.action != 'cleanup-preview'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      errors: ${{ steps.validate.outputs.errors }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose conventions
        id: validate
        run: |
          set -euo pipefail
          COMPOSE_FILE="docker-compose.yml"
          INFRA_COMPOSE="docker-compose.infra.yml"
          ERRORS=()

          if [[ ! -f "$COMPOSE_FILE" ]]; then
            echo "::error::Compose file not found: $COMPOSE_FILE"
            exit 1
          fi

          echo "=== Level 0: Validating compose conventions ==="

          TWO_PHASE=false
          if [[ -f "$INFRA_COMPOSE" ]]; then
            TWO_PHASE=true
            echo "Two-phase project detected: $INFRA_COMPOSE exists"
          fi

          # ── Shared checks: healthcheck, version pinning, volume name ban ──
          validate_shared() {
            local file="$1"
            local prefix="$2"  # "" for app, "infra " for infra

            local services
            services=$(yq '.services | keys | .[]' "$file" 2>/dev/null || true)
            [[ -z "$services" ]] && return

            # Healthcheck on every service
            for svc in $services; do
              [[ "$(yq ".services.$svc.healthcheck" "$file")" != "null" ]] && continue
              ERRORS+=("${prefix}service '$svc': missing healthcheck")
            done

            # Version pinning on stateful services (named volumes = stateful)
            local named_vols
            named_vols=$(yq '.volumes | keys | .[]' "$file" 2>/dev/null || true)
            [[ -z "$named_vols" ]] && return

            for svc in $services; do
              local svc_vols
              svc_vols=$(yq ".services.$svc.volumes[]" "$file" 2>/dev/null || true)
              [[ -z "$svc_vols" ]] && continue

              # Check if service uses any named volume
              local is_stateful=false
              while IFS= read -r nvol; do
                [[ -z "$nvol" ]] && continue
                echo "$svc_vols" | grep -q "^${nvol}:" && is_stateful=true && break
              done <<< "$named_vols"
              [[ "$is_stateful" != "true" ]] && continue

              local image
              image=$(yq ".services.$svc.image" "$file" 2>/dev/null || true)
              [[ -z "$image" || "$image" == "null" ]] && continue

              local tag="${image##*:}"
              [[ "$image" == "$tag" ]] && tag=""
              if [[ -z "$tag" || "$tag" =~ ^(latest|main|dev|nightly)$ ]]; then
                ERRORS+=("${prefix}service '$svc': image tag not pinned on stateful service — pin major version")
              elif ! [[ "$tag" =~ [0-9] ]]; then
                ERRORS+=("${prefix}service '$svc': image tag '$tag' not pinned — pin major version")
              fi
            done

            # No hardcoded volume name: (breaks COMPOSE_PROJECT_NAME isolation)
            local hardcoded
            hardcoded=$(yq '.volumes | to_entries | .[] | select(.value != null and .value.name != null) | .key' "$file" 2>/dev/null || true)
            [[ -z "$hardcoded" ]] && return
            while IFS= read -r vol; do
              [[ -z "$vol" ]] && continue
              ERRORS+=("${prefix}volume '$vol': hardcoded name: breaks isolation")
            done <<< "$hardcoded"
          }

          # ── App compose checks (docker-compose.yml) ──

          # No container_name (breaks COMPOSE_PROJECT_NAME isolation)
          if grep -qP '^\s+container_name:' "$COMPOSE_FILE"; then
            ERRORS+=("container_name: found in $COMPOSE_FILE — breaks isolation")
          fi

          # External network validation (infra-aware)
          EXTERNAL_NETS=$(yq '.networks | to_entries | .[] | select(.value.external == true) | .key' "$COMPOSE_FILE" 2>/dev/null || true)
          if [[ -n "$EXTERNAL_NETS" ]]; then
            if [[ "$TWO_PHASE" == "true" ]]; then
              INFRA_NETS=$(yq '.networks | keys | .[]' "$INFRA_COMPOSE" 2>/dev/null || true)
              while IFS= read -r net; do
                [[ -z "$net" ]] && continue
                if ! echo "$INFRA_NETS" | grep -qx "$net"; then
                  ERRORS+=("network '$net': external: true not from infra compose — stacks must be self-contained")
                fi
              done <<< "$EXTERNAL_NETS"
            else
              ERRORS+=("external: true found — stacks must be self-contained")
            fi
          fi

          # .env.example or .env must exist
          if [[ ! -f ".env.example" ]] && [[ ! -f ".env" ]]; then
            ERRORS+=(".env.example missing")
          fi

          # Shared checks for app compose
          validate_shared "$COMPOSE_FILE" ""

          # ── Infra compose checks (docker-compose.infra.yml) ──
          if [[ "$TWO_PHASE" == "true" ]]; then
            echo "Validating infra compose..."
            validate_shared "$INFRA_COMPOSE" "infra "
            # Note: container_name is ALLOWED in infra compose
          fi

          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            for err in "${ERRORS[@]}"; do echo "::error::$err"; done
            ERR_STR=$(printf '%s; ' "${ERRORS[@]}")
            echo "errors=${ERR_STR}" >> "$GITHUB_OUTPUT"
            echo "${#ERRORS[@]} convention violation(s)."
            exit 1
          fi

          echo "Convention checks passed."

  # ─── Deploy: token generation, SSH transport, deploy-linker ───
  deploy:
    name: ${{ needs.route.outputs.action }}
    needs: [route, validate]
    if: |
      always() &&
      needs.route.result == 'success' &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check App credentials
        id: check-app
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          if [[ -n "$APP_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::APP_ID not set — falling back to SSH git auth"
          fi

      - name: Generate App token (git pull)
        id: app-token
        if: steps.check-app.outputs.available == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Generate App token (deploy-linker)
        id: linker-token
        if: steps.check-app.outputs.available == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: DaveX2001

      - name: Checkout deploy scripts
        uses: actions/checkout@v4
        with:
          repository: WILSCH-AI-SERVICES/deploy-action
          path: _deploy

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ inputs.ssh-host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run
        id: run
        env:
          ACTION: ${{ needs.route.outputs.action }}
          BRANCH: ${{ needs.route.outputs.branch }}
          DOMAIN_SUFFIX: ${{ inputs.domain-suffix }}
          SSH_HOST: ${{ inputs.ssh-host }}
          GIT_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_REPO: ${{ github.repository }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${SSH_HOST}"
          S="_deploy/scripts"
          PP="/home/deploy/projects/$(echo "$GIT_REPO" | cut -d/ -f2)"

          run_remote() {
            local script="$1"; shift
            $SSH "GIT_TOKEN=${GIT_TOKEN:-} GIT_REPO=${GIT_REPO:-} bash -s -- $*" < "$script"
          }

          case "$ACTION" in
            deploy-preview)
              run_remote "${S}/preflight.sh" "$PP" 2>&1 | tee /tmp/deploy.log
              run_remote "${S}/deploy-preview.sh" "$PP" "$BRANCH" "$DOMAIN_SUFFIX" \
                2>&1 | tee -a /tmp/deploy.log
              PREVIEW_URL=$(grep -oP 'https://[a-z0-9-]+\.\S+' /tmp/deploy.log | tail -1)
              echo "preview-url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
              ;;
            cleanup-preview)
              $SSH "bash -s -- $PP $BRANCH $DOMAIN_SUFFIX" < "${S}/cleanup-preview.sh"
              ;;
            deploy-staging)
              run_remote "${S}/preflight.sh" "$PP" 2>&1 | tee /tmp/deploy.log
              run_remote "${S}/deploy-staging.sh" "$PP" "$DOMAIN_SUFFIX" \
                2>&1 | tee -a /tmp/deploy.log
              ;;
          esac

      - name: Parse deploy error
        id: parse-error
        if: failure()
        run: |
          if [[ -f /tmp/deploy.log ]]; then
            DEPLOY_ERR=$(grep 'DEPLOY_ERROR:' /tmp/deploy.log | tail -1 || true)
            if [[ -n "$DEPLOY_ERR" ]]; then
              LEVEL=$(echo "$DEPLOY_ERR" | sed 's/.*LEVEL=\([0-9]*\).*/\1/')
              DETAIL=$(echo "$DEPLOY_ERR" | sed 's/.*DETAIL=//')
              echo "level=$LEVEL" >> "$GITHUB_OUTPUT"
              echo "detail=$DETAIL" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy-linker — success
        if: success() && needs.route.outputs.issue-number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.linker-token.outputs.token }}
          ACTION: ${{ needs.route.outputs.action }}
          ISSUE: ${{ needs.route.outputs.issue-number }}
          BRANCH: ${{ needs.route.outputs.branch }}
          PREVIEW_URL: ${{ steps.run.outputs.preview-url }}
          DOMAIN_SUFFIX: ${{ inputs.domain-suffix }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then exit 0; fi

          case "$ACTION" in
            deploy-preview)
              URL="${PREVIEW_URL:-https://${BRANCH}.${DOMAIN_SUFFIX}}"
              BODY="📦 **Preview deployed:** ${URL}

          Branch: \`${BRANCH}\`
          Commit: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          🤖"
              ;;
            cleanup-preview)
              BODY="🧹 **Preview cleaned up** for branch \`${BRANCH}\`

          🤖"
              ;;
            deploy-staging)
              BODY="🚀 **Staging deployed**

          Commit: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          🤖"
              ;;
          esac

          gh issue comment "$ISSUE" \
            --repo DaveX2001/deliverable-tracking \
            --body "$BODY"

      - name: Deploy-linker — failure
        if: failure() && needs.route.outputs.issue-number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.linker-token.outputs.token }}
          LEVEL: ${{ steps.parse-error.outputs.level }}
          DETAIL: ${{ steps.parse-error.outputs.detail }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then exit 0; fi

          case "${LEVEL:-}" in
            1) LEVEL_NAME="server pre-flight" ;;
            2) LEVEL_NAME="compose config" ;;
            3) LEVEL_NAME="health checks" ;;
            4) LEVEL_NAME="external access" ;;
            *) LEVEL_NAME="unknown"; LEVEL="?" ;;
          esac

          if [[ -n "${DETAIL:-}" ]]; then
            BODY="❌ **Deploy failed at Level ${LEVEL} (${LEVEL_NAME})**

          > ${DETAIL}

          Branch: \`${{ needs.route.outputs.branch }}\`
          Commit: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          🤖"
          else
            BODY="❌ **Deploy failed at Level ${LEVEL} (${LEVEL_NAME})**

          Branch: \`${{ needs.route.outputs.branch }}\`
          Commit: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          🤖"
          fi

          gh issue comment "${{ needs.route.outputs.issue-number }}" \
            --repo DaveX2001/deliverable-tracking \
            --body "$BODY"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ─── Deploy-linker: Level 0 failure (validator rejected) ───
  linker-l0:
    name: Deploy Linker — L0
    needs: [route, validate]
    if: |
      always() &&
      needs.validate.result == 'failure' &&
      needs.route.outputs.issue-number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check App credentials
        id: check-app
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          if [[ -n "$APP_ID" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate App token
        id: linker-token
        if: steps.check-app.outputs.available == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: DaveX2001

      - name: Post L0 failure comment
        env:
          GH_TOKEN: ${{ steps.linker-token.outputs.token }}
          ERRORS: ${{ needs.validate.outputs.errors }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then exit 0; fi

          BODY="❌ **Deploy failed at Level 0 (convention)**

          > ${ERRORS}

          Branch: \`${{ needs.route.outputs.branch }}\`
          Commit: [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          🤖"

          gh issue comment "${{ needs.route.outputs.issue-number }}" \
            --repo DaveX2001/deliverable-tracking \
            --body "$BODY"
